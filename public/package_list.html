<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KMKZ - Daftar Paket</title>
    <meta
      name="description"
      content="Web Dor Paket XL buatan Tim KMKZ — tempat ngulik, ngetes, dan ngebut bareng jaringan XL."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://i.ibb.co.com/M0N8h0C/takina.webp"
      as="image"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://www.xl.co.id/icons/favicon.png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.0/lib/sakana.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="sakana-widget" class="sakana-widget"></div>
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h4><i class="fa-solid fa-dragon"> </i> KMKZ MENU</h4>
      </div>
      <ul class="sidebar-menu">
        <li>
          <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
        </li>
        <li>
          <a href="login.html"><i class="fas fa-key"></i> Login</a>
        </li>
        <li>
          <a href="package_details.html"
            ><i class="fas fa-box-open"></i> Detail Paket</a
          >
        </li>
        <li>
          <a href="package_list.html" class="active"
            ><i class="fas fa-list-alt"></i> Daftar Paket</a
          >
        </li>
        <li class="dropdown">
          <a href="#" class="dropdown-toggle"
            ><i class="fas fa-shopping-cart"></i><span>DOR</span
            ><i class="fas fa-chevron-down dropdown-icon"></i
          ></a>
          <ul class="dropdown-menu">
            <li><a href="dor.html">DOR</a></li>
            <li><a href="dorv2.html">DORv2</a></li>
            <li><a href="dorv3.html">DORv3</a></li>
          </ul>
        </li>
      </ul>
      <div class="sidebar-footer">
        <p>Dibuat oleh Tim KMKZ</p>
        <a
          href="https://t.me/ChannelMayumi"
          target="_blank"
          aria-label="Telegram KMKZ"
        >
          <i class="fab fa-telegram-plane"></i>
        </a>
        <button id="clearSessionBtn" aria-label="Hapus Sesi Tersimpan">
          <i class="fas fa-trash-alt"></i>
        </button>
      </div>
    </nav>

    <main class="main-content" id="mainContent">
      <header class="header">
        <button class="menu-toggle" id="menuToggle">
          <i id="menuIcon" class="fas fa-bars"></i>
        </button>
        <h1 class="header-title">Daftar Paket Family</h1>
        <button id="darkModeToggle" class="theme-toggle">
          <i id="darkModeIcon" class="fas fa-moon"></i>
          <span id="darkModeText">Dark Mode</span>
        </button>
      </header>

      <div class="content-container">
        <div class="current-phone-banner">
          <span>Nomor Aktif: </span>
          <strong id="currentPhoneNumber">-</strong>
        </div>

        <section class="card">
          <div class="card-header">
            <h2 class="card-title">
              <i class="fas fa-search"></i> Cari Berdasarkan Kode Family
            </h2>
          </div>
          <div class="card-body">
            <form id="packageListForm" method="post">
              <div class="form-group">
                <label for="familyCode" class="form-label">Kode Family</label>
                <input
                  type="text"
                  class="form-control"
                  id="familyCode"
                  name="familyCode"
                  placeholder="Masukkan kode family di sini..."
                  required
                />
              </div>

              <!-- isEnterprise dengan default TIDAK -->
              <div class="form-group">
                <label for="isEnterprise" class="form-label">Enterprise</label>
                <select class="form-control" id="isEnterprise" name="isEnterprise" required>
                  <option value="YA">YA</option>
                  <option value="TIDAK" selected>TIDAK</option>
                </select>
              </div>

              <!-- migrationType dengan NONE di posisi pertama dan sebagai default -->
              <div class="form-group">
                <label for="migrationType" class="form-label">Tipe Migrasi</label>
                <select class="form-control" id="migrationType" name="migrationType" required>
                  <option value="NONE" selected>NONE</option>
                  <option value="PRE_TO_PRIOH">PRE_TO_PRIOH</option>
                  <option value="PRIO_TO_PRIOH">PRIO_TO_PRIOH</option>
                  <option value="PRIOH_TO_PRIO">PRIOH_TO_PRIO</option>
                </select>
              </div>
              
              <button type="submit" class="btn btn-primary" id="packageListBtn">
                <span
                  class="spinner"
                  id="packageListSpinner"
                  style="display: none"
                ></span>
                <span id="packageListBtnText">Dapatkan Daftar Paket</span>
              </button>
              <div class="error-text" id="packageListError"></div>
            </form>
          </div>
        </section>

        <section class="card" id="resultSection" style="display: none">
          <div class="card-header result-header">
            <h2 class="card-title">
              <i class="fas fa-info-circle"></i> Hasil Daftar Paket
            </h2>
            <button id="togglePackageListViewBtn" class="btn btn-secondary">
              Lihat JSON
            </button>
          </div>
          <div class="card-body">
            <pre
              id="packageListJsonView"
              class="response-box"
              style="display: none"
              tabindex="0"
            ></pre>
            <div
              id="packageListFormattedView"
              class="response-box formatted-view"
              tabindex="0"
            ></div>
          </div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <script
      src="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.0/lib/sakana.min.js"
      defer
    ></script>
    <script src="js/app.js" defer></script>
  </body>
</html>
