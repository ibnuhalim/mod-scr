<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KMKZ Free DOR</title>
    <meta
      name="description"
      content="Web Dor Paket XL buatan Tim KMKZ — tempat ngulik, ngetes, dan ngebut bareng jaringan XL."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://i.ibb.co.com/M0N8h0C/takina.webp"
      as="image"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://www.xl.co.id/icons/favicon.png"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.0/lib/sakana.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="sakana-widget" class="sakana-widget"></div>
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h4><i class="fa-solid fa-dragon"> </i> KMKZ MENU</h4>
      </div>
      <ul class="sidebar-menu">
        <li>
          <a href="index.html" class="active"
            ><i class="fas fa-home"></i> Dashboard</a
          >
        </li>
        <li>
          <a href="login.html"><i class="fas fa-key"></i> Login</a>
        </li>
        <li>
          <a href="package_details.html"
            ><i class="fas fa-box-open"></i> Detail Paket</a
          >
        </li>
        <li>
          <a href="package_list.html"
            ><i class="fas fa-list-alt"></i> Daftar Paket</a
          >
        </li>
        <li class="dropdown">
          <a href="#" class="dropdown-toggle">
            <i class="fas fa-shopping-cart"></i>
            <span>DOR</span>
            <i class="fas fa-chevron-down dropdown-icon"></i>
          </a>
          <ul class="dropdown-menu">
            <li><a href="dor.html">DOR</a></li>
            <li><a href="dorv2.html">DORv2</a></li>
            <li><a href="dorv3.html">DORv3</a></li>
          </ul>
        </li>
      </ul>
      <div class="sidebar-footer">
        <p>Dibuat oleh Tim KMKZ</p>
        <a
          href="https://t.me/ChannelMayumi"
          target="_blank"
          aria-label="Telegram KMKZ"
        >
          <i class="fab fa-telegram-plane"></i>
        </a>
        <button id="clearSessionBtn" aria-label="Hapus Sesi Tersimpan">
          <i class="fas fa-trash-alt"></i>
        </button>
      </div>
    </nav>

    <main class="main-content" id="mainContent">
      <header class="header">
        <button
          class="menu-toggle"
          id="menuToggle"
          aria-label="Buka Menu Navigasi"
        >
          <i id="menuIcon" class="fas fa-bars"></i>
        </button>
        <h1 class="header-title">KMKZ Free Dor</h1>
        <button id="darkModeToggle" class="theme-toggle">
          <i id="darkModeIcon" class="fas fa-moon"></i>
          <span id="darkModeText">Dark Mode</span>
        </button>
      </header>

      <div class="card selector-card">
        <div class="card-body">
          <label for="phoneSelect" class="form-label">
            <strong
              ><i class="fas fa-phone-alt"></i> Pilih Nomor Telepon
            </strong>
          </label>
          <select id="phoneSelect" class="form-select">
            <option value="" disabled selected>-- Memuat Nomor --</option>
          </select>
        </div>
      </div>

      <div class="dashboard-grid">
        <section class="card info-card">
          <div class="card-header">
            <h2 class="card-title">
              <i class="fas fa-user-circle"></i> Informasi Akun
            </h2>
          </div>
          <div class="card-body">
            <div class="info-item">
              <span><i class="fas fa-mobile-alt"></i> Phone Number</span>
              <strong id="dashboardPhone">-</strong>
            </div>
            <div class="info-item">
              <span><i class="fas fa-wallet"></i> Pulsa</span>
              <strong id="dashboardBalance">-</strong>
            </div>
            <div class="info-item">
              <span><i class="fas fa-calendar-alt"></i> Aktif Hingga</span>
              <strong id="dashboardExpiredAt">-</strong>
            </div>
          </div>
        </section>

        <section
          class="card quota-card"
          id="quotaDetailsSection"
          style="display: none"
        >
          <div class="card-header">
            <h2 class="card-title">
              <i class="fas fa-chart-pie"></i> Detail Kuota
            </h2>
          </div>
          <div class="card-body" id="quotaDetailsContent">
            <p>Loading...</p>
          </div>
        </section>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <script
      src="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.0/lib/sakana.min.js"
      defer
    ></script>
    <script src="js/app.js" defer></script>
  </body>
</html>
