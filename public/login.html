<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KMKZ - Login</title>
    <meta
      name="description"
      content="Web Dor Paket XL buatan Tim KMKZ — tempat ngulik, ngetes, dan ngebut bareng jaringan XL."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://i.ibb.co.com/M0N8h0C/takina.webp"
      as="image"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://www.xl.co.id/icons/favicon.png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.0/lib/sakana.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="sakana-widget" class="sakana-widget"></div>
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h4><i class="fa-solid fa-dragon"> </i> KMKZ MENU</h4>
      </div>
      <ul class="sidebar-menu">
        <li>
          <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
        </li>
        <li>
          <a href="login.html" class="active"
            ><i class="fas fa-key"></i> Login</a
          >
        </li>
        <li>
          <a href="package_details.html"
            ><i class="fas fa-box-open"></i> Detail Paket</a
          >
        </li>
        <li>
          <a href="package_list.html"
            ><i class="fas fa-list-alt"></i> Daftar Paket</a
          >
        </li>
        <li class="dropdown">
          <a href="#" class="dropdown-toggle">
            <i class="fas fa-shopping-cart"></i>
            <span>DOR</span>
            <i class="fas fa-chevron-down dropdown-icon"></i>
          </a>
          <ul class="dropdown-menu">
            <li><a href="dor.html">DOR</a></li>
            <li><a href="dorv2.html">DORv2</a></li>
            <li><a href="dorv3.html">DORv3</a></li>
          </ul>
        </li>
      </ul>
      <div class="sidebar-footer">
        <p>Dibuat oleh Tim KMKZ</p>
        <a
          href="https://t.me/ChannelMayumi"
          target="_blank"
          aria-label="Telegram KMKZ"
        >
          <i class="fab fa-telegram-plane"></i>
        </a>
        <button id="clearSessionBtn" aria-label="Hapus Sesi Tersimpan">
          <i class="fas fa-trash-alt"></i>
        </button>
      </div>
    </nav>

    <main class="main-content" id="mainContent">
      <header class="header">
        <button
          class="menu-toggle"
          id="menuToggle"
          aria-label="Buka Menu Navigasi"
        >
          <i id="menuIcon" class="fas fa-bars"></i>
        </button>
        <h1 class="header-title">Autentikasi Akun</h1>
        <button id="darkModeToggle" class="theme-toggle">
          <i id="darkModeIcon" class="fas fa-moon"></i>
          <span id="darkModeText">Dark Mode</span>
        </button>
      </header>

      <div class="login-container">
        <section class="card login-card" id="reqOtpFormSection">
          <div class="card-header">
            <h2 class="card-title">
              <i class="fas fa-paper-plane"></i> Minta Kode OTP
            </h2>
          </div>
          <div class="card-body">
            <form id="reqOtpForm" method="post">
              <div class="form-group">
                <label for="reqPhoneNumber" class="form-label"
                  >Nomor Telepon</label
                >
                <input
                  type="tel"
                  class="form-control"
                  id="reqPhoneNumber"
                  name="phoneNumber"
                  placeholder="Contoh: 081701234567"
                  required
                />
              </div>
              <div class="form-group">
                <label for="reqSubsType" class="form-label"
                  >Tipe Langganan</label
                >
                <select class="form-select" id="reqSubsType" name="subsType">
                  <option value="PREPAID" selected>PREPAID</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary" id="reqOtpBtn">
                <span
                  class="spinner"
                  id="reqOtpSpinner"
                  style="display: none"
                ></span>
                <span id="reqOtpBtnText">Kirim OTP</span>
              </button>
              <div class="error-text" id="reqOtpError"></div>
            </form>
            <div id="reqOtpResult" class="response-box" tabindex="0"></div>
          </div>
        </section>

        <section
          class="card login-card"
          id="confirmOtpSection"
          style="display: none"
        >
          <div class="card-header">
            <h2 class="card-title">
              <i class="fas fa-check-circle"></i> Konfirmasi Kode OTP
            </h2>
          </div>
          <div class="card-body">
            <form id="confirmOtpForm" method="post">
              <input type="hidden" name="confirmPhoneNumber" />
              <input type="hidden" name="confirmSubsType" />
              <div class="form-group">
                <label for="confirmCode" class="form-label">Kode OTP</label>
                <input
                  type="text"
                  class="form-control"
                  id="confirmCode"
                  name="code"
                  placeholder="Masukkan 6 digit kode"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary" id="confirmOtpBtn">
                <span
                  class="spinner"
                  id="confirmOtpSpinner"
                  style="display: none"
                ></span>
                <span id="confirmOtpBtnText">Konfirmasi & Login</span>
              </button>
              <div class="error-text" id="confirmOtpError"></div>
            </form>
            <div id="confirmOtpResult" class="response-box" tabindex="0"></div>
            <button
              id="copyRefreshTokenBtn"
              class="btn btn-secondary"
              style="display: none"
              type="button"
            >
              <i class="fas fa-copy"></i> Salin Refresh Token
            </button>
          </div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <script
      src="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.0/lib/sakana.min.js"
      defer
    ></script>
    <script src="js/app.js" defer></script>
  </body>
</html>
